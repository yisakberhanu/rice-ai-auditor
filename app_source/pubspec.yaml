name: africa_rice_app
description: "AI-Powered Rice Quality Analysis for African Smallholder Farmers."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # --- AI & Image Processing ---
  tflite_flutter: ^0.12.1      # Core TFLite engine (Updated for compatibility)
  image: ^4.1.3                # Fast image decoding and resizing for AI input
  image_picker: ^1.0.4         # Added missing dependency for camera roll access

  # --- Storage & Database ---
  sqflite: ^2.3.0              # Local SQLite database for scan history
  path: ^1.8.3                 # Managing database file paths
  path_provider: ^2.1.1        # Accessing local storage for images/DB
  shared_preferences: ^2.2.3   # Added missing dependency for user settings
  csv: ^6.0.0                  # Added missing dependency for data export

  # --- Hardware & Permissions ---
  camera: ^0.10.5+5            # Real-time grain capture
  geolocator: ^11.0.0          # Offline GPS capture (Zindi requirement)
  permission_handler: ^11.1.0  # Managing camera/location permissions
  sensors_plus: ^5.0.1         # Added missing dependency for device sensors
  connectivity_plus: ^6.0.3    # Added missing dependency for network status

  # --- UI & Utilities ---
  cupertino_icons: ^1.0.6
  share_plus: ^7.2.2           # Exporting Lab Certificates as PDF/Text
  intl: ^0.19.0                # Formatting timestamps and dates
  google_fonts: ^6.1.0         # Professional typography for Milling Grades

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

flutter_icons:
  android: true
  ios: true
  image_path: "assets/app.png"

flutter:
  uses-material-design: true

  # 🚨 ASSETS REGISTRATION (Crucial for AI loading)
  assets:
    - assets/RICE_MOBILE_FINAL_V2.tflite
    - assets/flutter_stats.json
    - assets/app.png
